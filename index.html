<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: black;

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: Arial;
  }

  h1 {
    color: #ff2e88;
    font-size: 42px;
    margin-bottom: 40px;

    text-shadow:
      0 0 10px #ff2e88,
      0 0 20px #ff2e88,
      0 0 40px #ff2e88;
  }

  /* ❤️ CORAZÓN */
  .heart {
    position: relative;
    width: 280px;
    height: 280px;
    transform: rotate(45deg);
    background: #ff2e88;

    box-shadow:
      0 0 30px #ff2e88,
      0 0 60px #ff2e88,
      0 0 100px #ff2e88;

    animation: pulse 1.2s infinite;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 280px;
    height: 280px;
    background: #ff2e88;
    border-radius: 50%;

    box-shadow:
      0 0 30px #ff2e88,
      0 0 60px #ff2e88,
      0 0 100px #ff2e88;
  }

  .heart::before {
    top: -140px;
    left: 0;
  }

  .heart::after {
    left: -140px;
    top: 0;
  }

  /* 💓 LATIDO */
  @keyframes pulse {
    0%   { transform: scale(1) rotate(45deg); }
    50%  { transform: scale(1.08) rotate(45deg); }
    100% { transform: scale(1) rotate(45deg); }
  }
</style>
</head>

<body>

<h1>I love you ❤️</h1>

<div class="heart"></div>

</body>
</html>
