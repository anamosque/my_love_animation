<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Love</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: black;

    display: flex;
    flex-direction: column;
    justify-content: flex-start; /* 👈 clave */
    align-items: center;

    padding-top: 40px; /* espacio arriba */
    overflow: hidden;
    font-family: Arial;
  }

  h1 {
    color: #ff2e88;
    font-size: 42px;
    margin-bottom: 20px;

    text-shadow:
      0 0 10px #ff2e88,
      0 0 20px #ff2e88,
      0 0 40px #ff2e88;
  }

  /* ❤️ CORAZÓN */
  .heart {
    position: relative;
    width: 260px; /* 👈 un poquito más pequeño */
    height: 260px;
    transform: rotate(45deg);
    background: #ff2e88;

    margin: 30px 0; /* 👈 separa del texto */

    box-shadow:
      0 0 30px #ff2e88,
      0 0 60px #ff2e88,
      0 0 100px #ff2e88;

    animation: pulse 1.2s infinite;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 260px;
    background: #ff2e88;
    border-radius: 50%;

    box-shadow:
      0 0 30px #ff2e88,
      0 0 60px #ff2e88,
      0 0 100px #ff2e88;
  }

  .heart::before {
    top: -130px;
    left: 0;
  }

  .heart::after {
    left: -130px;
    top: 0;
  }

  /* 💓 LATIDO */
  @keyframes pulse {
    0%   { transform: scale(1) rotate(45deg); }
    50%  { transform: scale(1.08) rotate(45deg); }
    100% { transform: scale(1) rotate(45deg); }
  }

  /* 💖 NOMBRE */
  .nombre {
    margin-top: 30px;
    color: #ff80bf;
    font-size: 28px;
    font-weight: bold;

    text-shadow:
      0 0 10px #ff80bf,
      0 0 20px #ff80bf,
      0 0 40px #ff2e88;
  }
</style>
</head>

<body>

<h1>I love you ❤️</h1>

<div class="heart"></div>

<div class="nombre">Emanolito ❤️</div>

</body>
</html>
